# pnpm variant of the Codex sandbox bootstrap (hand-authored).
version = 1
name = "asset_tracker"

[setup]
script = '''
cd "$CODEX_WORKTREE_PATH"
# Point pnpm's store at a path under $ASSET_TRACKER_CACHE_ROOT so it survives
# across ephemeral sandbox sessions (set that var to a persistent volume).
# pnpm reads npm_config_store_dir natively — no custom logic in setup-worktree.
export npm_config_store_dir="${ASSET_TRACKER_CACHE_ROOT:-$HOME/.cache/asset_tracker}/pnpm-store"
corepack enable
pnpm setup:worktree
'''
