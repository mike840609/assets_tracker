# pnpm 11 moved settings that used to live under the `pnpm` field in package.json
# into this file. See https://pnpm.io/settings

# pnpm 11 ships a default supply-chain policy that rejects packages published
# within the last ~24h (minimumReleaseAge). Disable it so installs/CI/Vercel stay
# deterministic and don't fail for ~24h whenever a dependency cuts a new release.
minimumReleaseAge: 0

# Dependencies allowed to run install/build lifecycle scripts (pnpm blocks these
# by default for security). This preserves npm's run-all-build-scripts behavior.
allowBuilds:
  "@parcel/watcher": true
  "@prisma/engines": true
  "@sentry/cli": true
  "@swc/core": true
  msw: true
  prisma: true
  unrs-resolver: true
