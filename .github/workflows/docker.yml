name: Docker Smoke Test

on:
  pull_request:
    paths:
      - ".dockerignore"
      - ".env.example"
      - "Dockerfile"
      - "docker-compose.yml"
      - "next.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "prisma/**"
      - "src/lib/env.ts"
      - "src/lib/prisma.ts"
  push:
    branches: [master]
    paths:
      - ".dockerignore"
      - ".env.example"
      - "Dockerfile"
      - "docker-compose.yml"
      - "next.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "prisma/**"
      - "src/lib/env.ts"
      - "src/lib/prisma.ts"

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Fresh self-host smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Prepare test environment
        run: cp .env.example .env

      - name: Build and start the full stack
        run: docker compose --profile full up --build -d

      - name: Wait for the login page
        run: |
          for attempt in {1..30}; do
            if login_page=$(curl --fail --silent --show-error http://127.0.0.1:3000/login); then
              if grep -q "Self-host password" <<< "$login_page" && \
                 ! grep -q "Continue with Google" <<< "$login_page"; then
                exit 0
              fi
            fi
            sleep 5
          done
          docker compose --profile full ps
          docker compose --profile full logs app migrate
          exit 1

      - name: Confirm migrations are idempotent
        run: docker compose --profile full run --rm migrate

      - name: Stop test stack
        if: always()
        run: docker compose --profile full down -v --remove-orphans
