name: Vercel Preview E2E

on:
  deployment_status:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: vercel-preview-e2e-${{ github.event.deployment.sha }}
  cancel-in-progress: true

jobs:
  authorize:
    name: Authorize preview commit
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment != 'Production'
    runs-on: ubuntu-latest
    outputs:
      trusted: ${{ steps.trust.outputs.trusted }}
      url: ${{ steps.trust.outputs.url }}
    steps:
      - name: Allow only trusted same-repository pull requests
        id: trust
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const deployment = context.payload.deployment;
            const deploymentStatus = context.payload.deployment_status;
            const pullRequests = await github.paginate(
              github.rest.repos.listPullRequestsAssociatedWithCommit,
              { owner, repo, commit_sha: deployment.sha },
            );
            const trustedAssociations = new Set(["OWNER", "MEMBER", "COLLABORATOR"]);
            const trustedPullRequest = pullRequests.some(
              (pullRequest) =>
                pullRequest.head.repo?.full_name === `${owner}/${repo}` &&
                trustedAssociations.has(pullRequest.author_association),
            );
            const fromVercel =
              deployment.creator?.login === "vercel[bot]" &&
              deploymentStatus.creator?.login === "vercel[bot]";
            let previewUrl;
            try {
              previewUrl = new URL(deploymentStatus.environment_url);
            } catch {
              core.warning("Skipping preview E2E because the deployment URL is invalid.");
            }
            const trustedUrl =
              previewUrl instanceof URL &&
              previewUrl.protocol === "https:" &&
              previewUrl.hostname.endsWith(".vercel.app") &&
              previewUrl.port === "" &&
              previewUrl.username === "" &&
              previewUrl.password === "";
            const trusted = trustedPullRequest && fromVercel && trustedUrl;
            core.notice(
              trusted
                ? `Running preview E2E against ${previewUrl.origin}.`
                : "Skipping preview E2E because the commit, deployment source, or URL is not trusted.",
            );
            core.setOutput("trusted", String(trusted));
            core.setOutput("url", trusted ? previewUrl.origin : "");

  e2e:
    name: Playwright preview smoke tests
    needs: authorize
    if: needs.authorize.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.deployment.sha }}

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version
        id: playwright
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright browser (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.authorize.outputs.url }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: vercel-preview-playwright-report
          path: playwright-report/
          retention-days: 30
