name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
  push:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "**.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
  AUTH_SECRET: "ci-secret-placeholder-not-real"
  AUTH_GOOGLE_ID: "ci-google-id"
  AUTH_GOOGLE_SECRET: "ci-google-secret"
  CRON_SECRET: "ci-cron-secret"

jobs:
  format:
    name: Format check
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[skip ci]') && !contains(github.event.pull_request.body || '', '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  lint:
    name: Lint
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[skip ci]') && !contains(github.event.pull_request.body || '', '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type check
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[skip ci]') && !contains(github.event.pull_request.body || '', '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit:
    name: Unit tests
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[skip ci]') && !contains(github.event.pull_request.body || '', '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  build:
    name: Build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('.nvmrc', 'pnpm-lock.yaml', 'prisma/schema.prisma', 'next.config.ts') }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('.nvmrc', 'pnpm-lock.yaml', 'prisma/schema.prisma', 'next.config.ts') }}-

      - run: pnpm build

      - name: Measure bundle baseline
        run: node scripts/ci/bundle-size.mjs --write bundle-baseline.json

      - name: Save bundle baseline
        uses: actions/cache/save@v4
        with:
          path: bundle-baseline.json
          key: bundle-baseline-${{ github.sha }}

  bundle-size:
    name: Bundle size
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[skip ci]') && !contains(github.event.pull_request.body || '', '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('.nvmrc', 'pnpm-lock.yaml', 'prisma/schema.prisma', 'next.config.ts') }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('.nvmrc', 'pnpm-lock.yaml', 'prisma/schema.prisma', 'next.config.ts') }}-

      - run: pnpm build

      - name: Measure head bundle
        run: node scripts/ci/bundle-size.mjs --write bundle-head.json

      - name: Restore bundle baseline
        uses: actions/cache/restore@v4
        with:
          path: bundle-baseline.json
          key: bundle-baseline-pr-${{ github.sha }}
          restore-keys: |
            bundle-baseline-

      - name: Compare against baseline
        run: node scripts/ci/bundle-size.mjs --compare bundle-baseline.json --against bundle-head.json --max-growth 0.05
