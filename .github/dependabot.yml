version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    # Keep this entry for security updates, but do not raise routine version bumps.
    open-pull-requests-limit: 0
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    # Keep this entry for security updates, but do not raise routine version bumps.
    open-pull-requests-limit: 0
